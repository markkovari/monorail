# cross-rs config for the Pi target (ADR 0008).
# hidapi links libudev; the stock cross image lacks the target-arch package,
# so install it into the build container.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes libudev-dev:$CROSS_DEB_ARCH",
]

[build.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS", "PKG_CONFIG_PATH"]
