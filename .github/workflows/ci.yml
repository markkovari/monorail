name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Deny-all at the workflow level; each job states what it needs.
permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Workflow security lint — fails on any zizmor finding.
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false

  # fmt + clippy + tests over default-members (UI excluded, matches local builds)
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # sccache caches per object/crate (content-keyed), so DuckDB's bundled
      # C++ survives Cargo.lock changes that invalidate rust-cache.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CC: sccache cc
      CXX: sccache c++
      CARGO_INCREMENTAL: "0" # sccache cannot cache incremental artifacts
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      # hidapi's build script needs libudev headers on Linux
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: sccache --show-stats

  # Leptos UI must keep compiling for wasm32 (ADR 0011)
  ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy -p monorail-ui --target wasm32-unknown-unknown -- -D warnings

  # ADR 0002/0008: the Pi binary's dependency tree must stay DuckDB-free
  pi-dep-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: forbid duckdb in monorail-rower's tree
        run: |
          if cargo tree -p monorail-rower -i duckdb 2>/dev/null; then
            echo "::error::monorail-rower depends on duckdb — forbidden by ADR 0002/0008"
            exit 1
          fi
          echo "monorail-rower is duckdb-free"

  # Pi binary cross-compiles for aarch64 (ADR 0008); slow, so main + manual only
  cross-build:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cross
      - run: cross build --release -p monorail-rower --target aarch64-unknown-linux-gnu
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: monorail-rower-aarch64
          path: target/aarch64-unknown-linux-gnu/release/monorail-rower
