# Keeps SHA-pinned actions current (pins without updates rot into CVEs).
# Cooldown lets freshly published versions bake before we adopt them
# (supply-chain compromise window).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
